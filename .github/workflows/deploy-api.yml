name: Deploy API

on:
  push:
    branches: [main]
    paths:
      - "apps/api/**"
      - ".github/workflows/deploy-api.yml"

jobs:
  deploy:
    name: Deploy to Aliyun
    runs-on: ubuntu-latest
    steps:
      - name: Validate secrets
        run: |
          missing=""
          [ -z "${{ secrets.SERVER_HOST }}" ] && missing="$missing SERVER_HOST"
          [ -z "${{ secrets.SERVER_USER }}" ] && missing="$missing SERVER_USER"
          [ -z "${{ secrets.SERVER_SSH_KEY }}" ] && missing="$missing SERVER_SSH_KEY"
          if [ -n "$missing" ]; then
            echo "::error::Missing required secrets:$missing"
            echo "Go to repo Settings > Secrets and variables > Actions to add them."
            exit 1
          fi
          echo "All secrets are configured."

      - name: Deploy via SSH
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ secrets.SERVER_HOST }}
          username: ${{ secrets.SERVER_USER }}
          key: ${{ secrets.SERVER_SSH_KEY }}
          command_timeout: 5m
          script: |
            set -e

            echo "==> Pulling latest code..."
            cd /opt/finance-agent
            git pull origin main

            echo "==> Syncing dependencies..."
            cd apps/api
            uv sync

            echo "==> Running migrations..."
            ENV=prod uv run alembic upgrade head

            echo "==> Restarting service..."
            sudo systemctl restart finance-agent-api

            echo "==> Health check..."
            for i in 1 2 3 4 5 6; do
              sleep 5
              if curl -sf http://127.0.0.1:8000/health; then
                echo ""
                echo "Deploy succeeded!"
                exit 0
              fi
              echo "Attempt $i failed, retrying..."
            done
            echo "::error::Health check failed after 30s!"
            sudo journalctl -u finance-agent-api --no-pager -n 30
            exit 1
